name: Build

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev --extra tray --extra build

      - name: Create assets directory
        run: New-Item -ItemType Directory -Force -Path assets

      - name: Create icon if not exists
        run: |
          uv run python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (64, 64), color=(0, 120, 200))
          draw = ImageDraw.Draw(img)
          draw.rectangle([8, 8, 56, 56], fill=(255, 255, 255))
          draw.text((16, 22), 'PLT', fill=(0, 120, 200))
          img.save('assets/icon.ico')
          print('Created icon.ico')"

      - name: Build executable
        shell: bash
        run: |
          uv run pyinstaller --noconsole --windowed --onedir --name PLT-Optimizer \
            --icon=assets/icon.ico --add-data "assets/icon.ico;assets" \
            run_tray.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PLT-Optimizer-Windows
          path: dist/PLT-Optimizer/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PLT-Optimizer-Windows
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/PLT-Optimizer/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
