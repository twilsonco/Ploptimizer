name: CI

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
    branches: [main]

jobs:
  # Detect which paths changed in this push/PR so downstream jobs can
  # skip work that isn't relevant to the change set.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      paths_result: ${{ steps.skip_check.outputs.paths_result }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: false
          do_not_skip: '["workflow_dispatch"]'
          paths_filter: |
            python:
              paths:
                - 'plt_optimizer/**/*.py'
                - 'tests/**/*.py'
            release:
              paths:
                - 'pyproject.toml'
                - 'CHANGELOG.md'
                - '.github/release-please-config.json'
                - '.github/release-please-manifest.json'

  # Skip lint/type-check/test for release-please PRs and for the push that
  # merges a release-please PR back into main. release-please creates PRs
  # from branches prefixed with 'release-please--branches--', and the
  # resulting merge commit message on the default branch typically contains
  # 'release-please' (for merge-commit merges) or matches release-please's
  # default PR title pattern `chore(<branch>): release ...` (for squash
  # merges). In both cases the upstream lint/type-check/test jobs have
  # already run successfully, so rerunning them is wasted CI.
  lint:
    name: Lint
    needs: changes
    if: |
      fromJSON(needs.changes.outputs.paths_result).python.should_skip == 'false' &&
      !(
        (github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--branches--')) ||
        (github.event_name == 'push' && (
          contains(github.event.head_commit.message, 'release-please') ||
          (startsWith(github.event.head_commit.message, 'chore') && contains(github.event.head_commit.message, ': release'))
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check plt_optimizer/

  type-check:
    name: Type Check
    needs: changes
    if: |
      fromJSON(needs.changes.outputs.paths_result).python.should_skip == 'false' &&
      !(
        (github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--branches--')) ||
        (github.event_name == 'push' && (
          contains(github.event.head_commit.message, 'release-please') ||
          (startsWith(github.event.head_commit.message, 'chore') && contains(github.event.head_commit.message, ': release'))
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev --extra plotting

      - name: Type check with mypy
        run: uv run mypy plt_optimizer/

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: |
      fromJSON(needs.changes.outputs.paths_result).python.should_skip == 'false' &&
      !(
        (github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--branches--')) ||
        (github.event_name == 'push' && (
          contains(github.event.head_commit.message, 'release-please') ||
          (startsWith(github.event.head_commit.message, 'chore') && contains(github.event.head_commit.message, ': release'))
        ))
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v --cov=plt_optimizer --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: success() && matrix.os == 'windows-latest'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  release-please:
    needs: [changes, lint, type-check, test]
    # Run when Python files or release-related files changed (to detect new
    # commits or pick up config changes). Skip on the release-please PR
    # itself (its branch is prefixed with 'release-please--branches--') to
    # avoid a no-op loop. Still allow it to run when lint/type-check/test
    # were skipped rather than succeeded (e.g. when the release-please PR
    # is merged back to main). Never proceed if any dependency failed or
    # was cancelled.
    if: |
      (fromJSON(needs.changes.outputs.paths_result).python.should_skip == 'false' || fromJSON(needs.changes.outputs.paths_result).release.should_skip == 'false') &&
      !(
        github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--branches--')
      ) && (
        always() &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled')
      )
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GH_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  build-windows-exe:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra tray --extra build
      - name: Create assets directory
        run: New-Item -ItemType Directory -Force -Path assets
      - name: Build executable
        shell: bash
        run: |
          uv run pyinstaller .github/plt_optimizer.spec
      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/PLT-Optimizer/PLT-Optimizer.exe
