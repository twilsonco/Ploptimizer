# See https://pre-commit.com for more information
# Local hooks configured to use uv for package management

default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check plt_optimizer/
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format plt_optimizer/
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy type check
        entry: uv run mypy plt_optimizer/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
